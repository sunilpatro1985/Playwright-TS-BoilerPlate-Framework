name: Decrypt Credentials Example

# This is an example workflow showing how to decrypt credentials.enc.json in GitHub Actions
# Before running your tests, add this step to decrypt the credentials file

on:
  workflow_dispatch:

jobs:
  decrypt-example:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # This step decrypts the credentials.enc.json file to credentials.json
      # The ENCRYPTION_KEY secret must be set in your GitHub repository settings
      - name: Decrypt credentials
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: npm run creds:decrypt

      - name: Verify credentials decrypted
        run: |
          if [ -f credentials.json ]; then
            echo "✓ Credentials successfully decrypted"
            # Verify it's valid JSON
            cat credentials.json | jq . > /dev/null && echo "✓ JSON is valid"
          else
            echo "✗ Credentials file not found"
            exit 1
          fi

      # Example: Run your tests with decrypted credentials
      # - name: Run tests
      #   run: npm test
